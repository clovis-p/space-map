services:
  backend:
    build:
      context: backend
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CORS_ALLOWED_ORIGINS=https://space-map.clovis.lol
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
